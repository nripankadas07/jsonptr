name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Run ruff
        run: ruff check .
      - name: Run pytest with coverage
        run: pytest --cov=jsonptr --cov-branch --cov-report=term-missing --cov-fail-under=100
      - name: Run mypy strict
        run: mypy --strict src/jsonptr
      - name: Build distribution
        if: matrix.python-version == '3.12'
        run: python -m build
      - name: Smoke installed wheel
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install --force-reinstall dist/jsonptr-*.whl
          python - <<'PY'
          import jsonptr

          doc = {"foo": ["bar"], "a/b": 1}
          assert jsonptr.resolve(doc, "/foo/0") == "bar"
          assert jsonptr.parse_uri_fragment("#/a~1b") == ("a/b",)
          PY
